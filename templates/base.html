<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Weather IoT Control</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        :root {
            --primary: #00f2ff;
            --secondary: #7000ff;
            --bg-dark: #060818;
            --card-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
            --text-main: #ffffff;
            --text-muted: #cbd5e1;
            --accent-temp: #fb923c;
            --accent-hum: #38bdf8;
            --accent-precip: #22d3ee;
            --accent-uv: #facc15;
            --accent-ai: #c084fc;
        }
        body { 
            background: radial-gradient(circle at top right, #0c0e2a, #060818); 
            color: var(--text-main); 
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
        }
        .glass-card { 
            background: var(--card-bg); 
            backdrop-filter: blur(16px); 
            border: 1px solid var(--glass-border); 
            border-radius: 18px;
            box-shadow: 0 10px 30px -10px rgba(0,0,0,0.5);
        }
        .sidebar { 
            background: rgba(0,0,0,0.4); 
            border-right: 1px solid var(--glass-border); 
            z-index: 1000;
        }
        .nav-link { 
            color: var(--text-muted) !important; 
            border-radius: 12px; 
            margin: 8px 15px; 
            padding: 12px 20px; 
            font-weight: 500;
            transition: all 0.2s ease;
        }
        .nav-link:hover {
            color: var(--primary) !important;
            background: rgba(255,255,255,0.05);
        }
        .nav-link.active { 
            background: linear-gradient(45deg, var(--primary), var(--secondary)); 
            color: white !important; 
            box-shadow: 0 4px 20px rgba(0, 242, 255, 0.4); 
        }
        .btn-premium { 
            background: linear-gradient(45deg, var(--primary), var(--secondary)); 
            border: none; 
            color: white; 
            border-radius: 14px; 
            font-weight: 600; 
            padding: 12px 28px;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .btn-premium:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 242, 255, 0.5);
            color: white;
        }
        .status-badge { 
            padding: 6px 16px; 
            border-radius: 30px; 
            font-size: 0.8rem; 
            font-weight: 700; 
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .status-idle { background: rgba(255,255,255,0.1); color: var(--text-muted); border: 1px solid rgba(255,255,255,0.1); }
        .status-running { background: rgba(34, 197, 94, 0.15); color: #4ade80; border: 1px solid rgba(34,197,94,0.3); animation: pulse 2s infinite; }
        .status-completed { background: rgba(59, 130, 246, 0.15); color: #60a5fa; border: 1px solid rgba(59,130,246,0.3); }
        
        h5, h6 { color: var(--text-main); font-weight: 600; letter-spacing: 0.5px; }
        .text-muted { color: var(--text-muted) !important; }
        
        @keyframes pulse { 0% { opacity: 0.7; } 50% { opacity: 1; } 100% { opacity: 0.7; } }
        
        /* Layout fixes */
        .main-content { margin-left: 16.666667%; padding: 40px; }
        @media (max-width: 768px) {
            .main-content { margin-left: 0; padding: 20px; }
            .sidebar { position: relative !important; width: 100% !important; height: auto !important; }
        }
    </style>
</head>
<body>
    <div class="container-fluid p-0">
        <div class="row g-0">
            <!-- Sidebar -->
            <nav class="col-md-3 col-lg-2 sidebar d-md-block vh-100 position-fixed p-0">
                <div class="p-4 mb-4 text-center mt-3">
                    <h3 class="fw-800 text-info m-0" style="letter-spacing: -1px;"><i class="bi bi-cpu-fill"></i> SENSOR<span class="text-white">AI</span></h3>
                    <div class="small text-info opacity-75 mt-1 fw-bold">ENGINE v2.0 PRO</div>
                </div>
                <div class="nav flex-column mt-4">
                    <a class="nav-link {% if request.path == '/' %}active{% endif %}" href="/"><i class="bi bi-grid-fill me-3"></i> Dashboard</a>
                    <a class="nav-link {% if request.path == '/pressure' %}active{% endif %}" href="/pressure"><i class="bi bi-speedometer2 me-3"></i> Atmospheric Pressure</a>
                    <a class="nav-link {% if request.path == '/temp_humidity' %}active{% endif %}" href="/temp_humidity"><i class="bi bi-thermometer-half me-3"></i> Analytics</a>
                    <a class="nav-link {% if request.path == '/precipitation' %}active{% endif %}" href="/precipitation"><i class="bi bi-cloud-drizzle-fill me-3"></i> Rainfall</a>
                    <a class="nav-link {% if request.path == '/uv_index' %}active{% endif %}" href="/uv_index"><i class="bi bi-sun-fill me-3"></i> UV Radiation</a>
                    <a class="nav-link {% if request.path == '/prediction' %}active{% endif %}" href="/prediction"><i class="bi bi-robot me-3"></i> AI Insights</a>
                </div>
            </nav>

            <!-- Main Content -->
            <main class="col-md-9 ms-sm-auto col-lg-10 main-content">
                <header class="d-flex justify-content-between align-items-center mb-5">
                    <div class="d-flex align-items-center">
                        <div id="sys-status-badge" class="status-badge status-idle me-4">Idle</div>
                        <div class="text-info small fw-bold"><i class="bi bi-broadcast me-2"></i>LIVE DATA STREAM</div>
                    </div>
                    <div class="d-flex gap-3 align-items-center">
                        <button class="btn btn-sm btn-outline-info rounded-pill px-4 py-2 fw-bold" onclick="exportCSV()"><i class="bi bi-download me-2"></i>EXPORT DATA</button>
                        <div class="ms-3 d-flex align-items-center">
                            <i class="bi bi-clock-fill text-info me-2"></i> 
                            <span id="last-updated" class="text-white fw-bold small">--:--:--</span>
                        </div>
                    </div>
                </header>

                {% block content %}{% endblock %}
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        let isDarkMode = true;
        function toggleDarkMode() {
            isDarkMode = !isDarkMode;
            document.body.style.filter = isDarkMode ? 'none' : 'invert(1) hue-rotate(180deg)';
        }

        async function fetchData() {
            try {
                const r = await fetch('/data');
                const d = await r.json();
                const badge = document.getElementById('sys-status-badge');
                badge.innerText = d.current.status;
                badge.className = 'status-badge status-' + d.current.status.toLowerCase();
                document.getElementById('last-updated').innerText = d.current.timestamp || '--:--:--';
                if (window.onUpdate) window.onUpdate(d);
            } catch (e) { console.error(e); }
        }

        function exportCSV() {
            fetch('/data').then(r => r.json()).then(d => {
                let csv = 'Timestamp,Temperature,Humidity,Precipitation,UV_Index\n';
                d.history.forEach(row => {
                    csv += `${row.timestamp},${row.temperature},${row.humidity},${row.precipitation},${row.uv_index}\n`;
                });
                const blob = new Blob([csv], { type: 'text/csv' });
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.setAttribute('href', url);
                a.setAttribute('download', 'weather_data.csv');
                a.click();
            });
        }

        setInterval(fetchData, 2000);
        fetchData();
    </script>
</body>
</html>
